name: priority
description: Personal productivity app — Notes, Eisenhower Matrix, Goals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI
  flutter_staggered_grid_view: ^0.7.0
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Utils
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
